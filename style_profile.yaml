# Krystal style rules for the Slovak translation of Summa Theologiae.
# This file drives translator and reviewer prompt construction.
#
# IMPORTANT: Structural heading formulas (sed_contra, respondeo, reply markers)
# are NOT here — they live in the DB (glossary_sense / sense_rendering) and are
# loaded at runtime. This file contains only translation *rules*.

citation_rules:
  aristotle: Bekker numbers in footnotes
  church_fathers: PL/PG references
  bible_abbreviations: JB (liturgický preklad)
  bible_text_source: ČEP (pri NZ môže byť vhodnejší liturgický preklad)
  translate_thomas_bible_from_latin: true
  note: Neprekladáme Bibliu, ale TA. Ak Tomáš cituje Bibliu, prekladáme z jeho latinčiny.

name_forms:
  author_names_in_text: KAPITÁLKY (nie majuskule)
  work_titles: kurzíva

orthography:
  prefer:
    - filozofia
    - teológia
    - -izmus
  avoid:
    - filosofia
    - theológia
    - -ismus

negative_constraints:
  - Nezvyšovať literárnu kvalitu nad originál.
  - Zachovávať opakovania (nesnažiť sa o variáciu).
  - Zachovávať scholastické spojky a výrazy.
  - Zachovávať hranice viet.
